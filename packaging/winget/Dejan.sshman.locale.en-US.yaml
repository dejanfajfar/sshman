ShortDescription: A simple interactive TUI SSH connection manager
Description: |-
  sshman is an interactive terminal UI for managing SSH connections and Docker
  containers. Navigate saved hosts with your keyboard, connect with Enter, search
  with /, import from ~/.ssh/config, and review your connection history — all
  without leaving the terminal.
